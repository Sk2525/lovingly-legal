<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lovingly - Legal Documents</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        header {
            background: #0a0a0a;
            color: white;
            padding: 2rem;
            text-align: center;
            border-bottom: 3px solid #1D9E75;
        }
        
        header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        
        header p {
            font-size: 0.95rem;
            opacity: 0.9;
        }
        
        .content {
            padding: 2rem;
        }
        
        .docs {
            display: grid;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        
        .doc-card {
            padding: 1.5rem;
            border: 2px solid #eee;
            border-radius: 8px;
            text-decoration: none;
            transition: all 0.3s ease;
            display: block;
            color: inherit;
        }
        
        .doc-card:hover {
            border-color: #1D9E75;
            background: #f9f9f9;
            transform: translateY(-4px);
            box-shadow: 0 4px 12px rgba(29, 158, 117, 0.2);
        }
        
        .doc-card .icon {
            font-size: 2rem;
            margin-bottom: 0.75rem;
            display: block;
        }
        
        .doc-card h2 {
            color: #0a0a0a;
            margin-bottom: 0.5rem;
            font-size: 1.2rem;
        }
        
        .doc-card p {
            color: #666;
            font-size: 0.9rem;
        }
        
        footer {
            background: #f5f5f5;
            padding: 1.5rem 2rem;
            text-align: center;
            border-top: 1px solid #eee;
            font-size: 0.85rem;
            color: #666;
        }
        
        footer a {
            color: #1D9E75;
            text-decoration: none;
        }
        
        footer a:hover {
            text-decoration: underline;
        }
        
        @media (max-width: 600px) {
            header h1 {
                font-size: 1.5rem;
            }
            
            .content {
                padding: 1.5rem;
            }
            
            .doc-card {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Lovingly</h1>
            <p>Legal Documents</p>
        </header>
        
        <div class="content">
            <div class="docs">
                <a href="terms.html" class="doc-card">
                    <span class="icon">⚖️</span>
                    <h2>Terms & Conditions</h2>
                    <p>Read our complete terms of service and usage agreements</p>
                </a>
                
                <a href="privacy.html" class="doc-card">
                    <span class="icon">🔒</span>
                    <h2>Privacy Policy</h2>
                    <p>Learn how we handle your data and protect your privacy</p>
                </a>
            </div>
        </div>
        
        <footer>
            <p>Questions? Contact us at <a href="mailto:lovingly.app@gmail.com">lovingly.app@gmail.com</a></p>
            <p style="margin-top: 0.75rem;">© 2026 Lovingly. All rights reserved.</p>
        </footer>
    </div>
</body>
</html>
